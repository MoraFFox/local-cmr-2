[build]
  command = "npm run build"
  publish = "dist" 

# SPA fallback redirects for client-side routes
[[redirects]]
  from = "/technician/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/invite"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/recovery/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/technician/invite"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/index.html"
  status = 200

# Catch-all redirect for other SPA routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
